- type: entity
  id: CrateDrinkBeerCan
  parent: CratePlastic
  name: beer crate
  description: A crate of beer is a source of true pleasure and great vibes. Inside are the finest brews, promising a golden hue, sparkling taste, and a unique aroma. Rest assured, opening this crate is your gateway to a world of high-quality, rich flavor. Contains 18 cans of beer.
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: DrinkCanPackBeer
          amount: 3
        - id: FoodMeatSalami
          prob: 0.04

- type: entity
  id: CrateExoticMeat
  parent: CrateFreezer
  name: exotic meat crate
  description: Contains over 10 pieces of unusual meat from all corners of the galaxy.
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        # base
        - id: FoodMeatFish
          amount: 4
        - id: FoodMeatXeno
          amount: 4
        # random common one
        - !type:GroupSelector
          children:
          - id: FoodMeatCrab
            amount: 3
            prob: 0.1
          - id: FoodMeatSnail
            amount: 3
            prob: 0.1
          - id: FoodMeatSpider
            amount: 3
            prob: 0.1
          - id: FoodMeatRat
            amount: 3
            prob: 0.1
          - id: FoodMeatSnake
            amount: 3
            prob: 0.1
        # rare ones. Small chance to get some
        - id: FoodMeatGoliath
          amount: 3
          prob: 0.25
        - id: FoodMeatTomato
          amount: 3
          prob: 0.25
        - id: FoodMeatPenguin
          amount: 3
          prob: 0.25
        - id: FoodMeatBear
          amount: 3
          prob: 0.25
        # flesh
        - !type:GroupSelector
          children:
          - id: FoodMeatHuman
            amount: 2
            prob: 0.1
          - id: FoodMeatSlime
            amount: 2
            prob: 0.1
          - id: FoodMeatLizard
            amount: 2
            prob: 0.1
          - id: FoodMeatPlant
            amount: 2
            prob: 0.1
        # very rare
        - id: FoodMeatClown
          amount: 3
          prob: 0.01
        - id: FoodMeatRouny
          amount: 1
          prob: 0.01
        # funny
        - id: FoodMeatCorgi
          amount: 1
          prob: 0.0001

- type: entity
  id: CrateMeat
  parent: CrateFreezer
  name: meat crate
  description: Contains 10 pieces of meat from NanoTrasen colonial farms!
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        # basic boring meat
        - id: FoodMeat
          amount: 5
        # bird meat
        - !type:GroupSelector
          prob: 0.3
          children:
          - id: FoodMeatChicken
            amount: 4
            weight: 1
          - id: FoodMeatDuck
            amount: 4
            weight: 1
        # some bacon
        - id: FoodMeatBacon
          amount: 2
