- type: entity
  parent: BoxCardboard
  id: BoxSurvivalCentcom
  name: extended-capacity survival box
  description: It's a box with basic internals inside. This one is labelled to contain an extended-capacity tank.
  suffix: Centcom
  components:
  - type: Sprite
    sprite: SS220/Objects/Storage/box.rsi
    state: centcom
    layers: [ ]
  - type: Item
    sprite: SS220/Objects/Storage/box.rsi
    size: Large
    shape:
    - 0,0,2,1
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,3,3
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: DoubleEmergencyOxygenTankFilled
        - id: CombatKnife
        - id: FlashlightSeclite
        - id: RadioHandheldCentcom
        - id: Matchbox
        - id: DrinkMREFlask
        - id: FoodSnackNutribrick
        - id: ClothingMaskBreath
        - id: CombatMedipen
