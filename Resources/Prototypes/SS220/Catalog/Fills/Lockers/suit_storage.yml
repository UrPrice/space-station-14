#blueshields's hardsuit
- type: entity
  id: SuitStorageBlueshield
  parent: SuitStorageBase
  suffix: Blueshield
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: NitrogenTankFilled
        - id: OxygenTankFilled
        - id: JetpackSecurityFilled
        - id: ClothingMaskBreath
  - type: AccessReader
    access: [ [ "Blueshield" ] ]

#SuperMatter operator's hardsuit
- type: entity
  id: SuitStorageSuperMatterOperator
  parent: SuitStorageBase
  suffix: SuperMatter operator
  components:
  - type: EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: OxygenTankFilled
        - id: ClothingShoesBootsMag
        - id: ClothingOuterHardsuitSuperMatterOperator
  - type: AccessReader
    access: [ [ "Atmospherics" ] ]
