- type: markingsGroup
  parent: Undergarments
  id: Tajaran
  onlyGroupWhitelisted: true
  limits:
    enum.HumanoidVisualLayers.Hair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.FacialHair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.Tail:
      limit: 1
      required: true
      default: [ TajaranTail ]
    enum.HumanoidVisualLayers.Snout:
      limit: 1
      required: true
      default: [ TajaranSnout ]
    enum.HumanoidVisualLayers.HeadTop:
      limit: 1
      required: true
      default: [ TajaranEars ]
    enum.HumanoidVisualLayers.HeadSide:
      limit: 0
      required: false

- type: entity
  name: tajaran appearance
  parent: BaseSpeciesAppearance
  id: AppearanceTajaran
  components:
  - type: Inventory
    speciesId: Tajaran
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: SS220/Mobs/Species/Tajaran/displacement.rsi
            state: jumpsuit-female
    maleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: SS220/Mobs/Species/Tajaran/displacement.rsi
            state: jumpsuit-male
  - type: InitialBody
    organs:
      Torso: OrganTajaranTorso
      Head: OrganTajaranHead
      ArmLeft: OrganTajaranArmLeft
      ArmRight: OrganTajaranArmRight
      HandRight: OrganTajaranHandRight
      HandLeft: OrganTajaranHandLeft
      LegLeft: OrganTajaranLegLeft
      LegRight: OrganTajaranLegRight
      FootLeft: OrganTajaranFootLeft
      FootRight: OrganTajaranFootRight
      Brain: OrganTajaranBrain
      Eyes: OrganTajaranEyes
      Tongue: OrganTajaranTongue
      Appendix: OrganTajaranAppendix
      Ears: OrganTajaranEars
      Lungs: OrganTajaranLungs
      Heart: OrganTajaranHeart
      Stomach: OrganTajaranStomach
      Liver: OrganTajaranLiver
      Kidneys: OrganTajaranKidneys
  - type: HumanoidProfile
    species: Tajaran
  - type: ScaleVisuals
    scale: 0.95, 0.95

- type: entity
  name: Urist McTajaran
  parent:
  - AppearanceTajaran
  - BaseSpeciesMobOrganic
  id: MobTajaran
  components:
  - type: Damageable
    damageModifierSet: Tajaran
  - type: TajaranAccent
  - type: TypingIndicator
    proto: tajaran
  - type: Wagging
    action: ActionToggleWaggingTajaran
  - type: Vocal
    sounds:
      Male: MaleTajaran
      Female: FemaleTajaran
      Unsexed: MaleTajaran
  - type: Speech
    speechSounds: Alto
    speechVerb: Tajaran
    allowedEmotes: ['Growl','Purr','Hiss','Meow','Mrow']
  - type: DamageOnHighSpeedImpact
    damage:
      types:
        Blunt: 0.9
    soundHit:
      path: /Audio/Effects/hit_kick.ogg
  - type: Butcherable
    butcheringType: Spike
    spawned:
      - id: FoodMeat
        amount: 5
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 185
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: MeleeWeapon
    soundHit:
      collection: AlienClaw
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 5
  - type: TemperatureDamage
    heatDamageThreshold: 320
    coldDamageThreshold: 230
    coldDamage:
      types:
        Cold: 0.05 #per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat: 2 #per second, scales with temperature & other constants
  - type: Temperature
    currentTemperature: 310.15
    specificHeat: 42
  - type: TemperatureSpeed
    thresholds:
      289: 0.8
      275: 0.6
      250: 0.4
  - type: KeenHearing
    visionRadius: 5
    highSensitiveVisionRadius: 2
    addAction: true
  - type: Language
    selectedLanguage: Galactic
    availableLanguages:
    - id: Galactic
    - id: Siiktajr
  - type: LimitationRevive
    reviveLimit: 3


- type: entity
  parent: OrganBase
  id: OrganTajaran
  abstract: true
  suffix: Tajaran

- type: entity
  id: OrganTajaranMetabolizer
  abstract: true
