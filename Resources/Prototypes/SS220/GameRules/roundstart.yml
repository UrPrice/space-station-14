- type: entity
  id: BaseCultYoggRule
  parent: BaseGameRule
  abstract: true
  components:
  - type: GameRule
    delay:
      min: 60
      max: 120
  - type: LoadMapRule
    mapPath: /Maps/SS220/cultyogg-teleport-hub.yml
  - type: CultYoggRule
  - type: AntagSelection
    definitions:
    - prefRoles: [ CultistOfYoggSothoth ]
      max: 5
      playerRatio: 9
      blacklist:
        components:
        - BibleUser
        - CultYoggSacrificial
      lateJoinAdditional: false
      mindRoles:
        - MindRoleCultYogg
      components:
      - type: AntagFreeSublevelPointsAdd
        addFreeSublevelPoints: 5
      - type: AntagAddKnowledge
        knowledgesToAdd:
        - CultYoggKnowledge

- type: entity
  id: CultYoggRuleMidPop
  parent: BaseCultYoggRule
  components:
  - type: GameRule
    minPlayers: 35 # WARNING: this should be always synced with other cult game rules and presets!
  - type: CultYoggRule
    stages:
      Initial:
        stageObjectives:
        - CultYoggEnslaveObjective
      Reveal:
        cultistsToCrewFraction: 0.25
      Alarm:
        cultistsToCrewFraction: 0.3
        stageObjectives:
        - CultYoggSacrificeObjective
      God:
        sacrificesRequired: 1

- type: entity
  id: CultYoggRuleHighPop
  parent: BaseCultYoggRule
  components:
  - type: GameRule
    minPlayers: 60 # WARNING: this should be always synced with other cult game rules and presets!
  - type: CultYoggRule
    stages:
      Initial:
        stageObjectives:
        - CultYoggEnslaveObjective
      Reveal:
        cultistsToCrewFraction: 0.15
      Alarm:
        cultistsToCrewFraction: 0.25
        stageObjectives:
        - CultYoggSacrificeObjective
      God:
        sacrificesRequired: 1

- type: entity
  parent: BaseGameRule
  id: FractWar
  components:
  - type: LoadMapRule
    mapPath: /Maps/SS220/EventMaps/FractWarShuttlesMap.yml
  - type: FractWarRule

- type: entity
  categories: [ GameRules ]
  parent: BaseGameRule
  id: SurvivalRule
  components:
  - type: GameRule
    minPlayers: 30

- type: entity
  id: EmergencyShuttleAutoCall
  parent: BaseGameRule
  categories: [ GameRules ]
  components:
  - type: EmergencyShuttleAutoCallRule

- type: entity
  id: EmergencyShuttleAutoVote
  parent: BaseGameRule
  categories: [ GameRules ]
  components:
  - type: EmergencyShuttleAutoVoteRule

- type: entity
  id: TraitorDynamic
  parent: Traitor
  components:
  - type: TraitorDynamics

- type: entity
  id: SpaceTrafficControlNeutralEventScheduler
  parent: BaseGameRule
  components:
  - type: BasicStationEventScheduler
    minimumTimeUntilFirstEvent: 1200 # 20 mins
    minMaxEventTiming:
      min: 600 # 10 mins
      max: 1800 # 15 mins
    scheduledGameRules: !type:NestedSelector
      tableId: UnknownShuttlesNeutralTable
