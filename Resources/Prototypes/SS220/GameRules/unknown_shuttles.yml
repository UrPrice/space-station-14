- type: entityTable
  id: UnknownShuttlesNeutralTable
  table: !type:AllSelector # we need to pass a list of rules, since rules have further restrictions to consider via StationEventComp
    children:
    - id: UnknownShuttleCargoLost
      weight: 1
    - id: UnknownShuttleTravelingCuisine
      weight: 1
    - id: UnknownShuttleDisasterEvacPod
      weight: 2
    - id: UnknownShuttleHonki
      weight: 2
    - id: UnknownShuttleCivil # SS220-Mimes-Lost-Shuttle
      weight: 1
    - id: UnknownShuttleMimesLost # SS220-Mimes-Lost-Shuttle
      weight: 2
    - id: UnknownShuttleRedwings # SS220-Redwings-Shuttle
      weight: 5

- type: entity
  parent: BaseUnknownShuttleRule
  id: UnknownShuttleCivil
  components:
  - type: StationEvent
    startAnnouncement: station-event-unknown-shuttle-incoming
    weight: 2
  - type: LoadMapRule
    gridPath: /Maps/SS220/Shuttles/lostSoul/civil.yml

- type: entity
  parent: BaseUnknownShuttleRule
  id: UnknownShuttleMimesLost
  components:
  - type: StationEvent
    startAnnouncement: station-event-unknown-shuttle-incoming
    maxOccurrences: 1
    weight: 4
  - type: LoadMapRule
    preloadedGrid: ShuttleMimesLost

- type: entity
  parent: BaseUnknownShuttleRule
  id: UnknownShuttleRedwings
  components:
  - type: StationEvent
    maxOccurrences: 1
    weight: 1
  - type: LoadMapRule
    preloadedGrid: Redwings
