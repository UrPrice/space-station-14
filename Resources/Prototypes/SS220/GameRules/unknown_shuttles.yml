- type: entityTable
  id: UnknownShuttlesNeutralTable
  table: !type:AllSelector # we need to pass a list of rules, since rules have further restrictions to consider via StationEventComp
    children:
    - id: UnknownShuttleCargoLost
      weight: 1
    - id: UnknownShuttleTravelingCuisine
      weight: 1
    - id: UnknownShuttleDisasterEvacPod
      weight: 2
    - id: UnknownShuttleHonki
      weight: 2
    - id: UnknownShuttleCivil # SS220-Mimes-Lost-Shuttle
      weight: 1
    - id: UnknownShuttleMimesLost # SS220-Mimes-Lost-Shuttle
      weight: 2
    - id: UnknownShuttleRedwings # SS220-Redwings-Shuttle
      weight: 5

- type: entity
  parent: BaseUnknownShuttleRule
  id: UnknownShuttleCivil
  components:
  - type: StationEvent
    startAnnouncement: station-event-unknown-shuttle-incoming
    weight: 2
  - type: LoadMapRule
    gridPath: /Maps/SS220/Shuttles/lostSoul/civil.yml

- type: entity
  parent: BaseUnknownShuttleRule
  id: UnknownShuttleMimesLost
  components:
  - type: StationEvent
    startAnnouncement: station-event-unknown-shuttle-incoming
    maxOccurrences: 1
    weight: 4
  - type: LoadMapRule
    preloadedGrid: ShuttleMimesLost

- type: entity
  parent: BaseUnknownShuttleRule
  id: UnknownShuttleRedwings
  components:
  - type: StationEvent
    maxOccurrences: 1
    weight: 1
  - type: LoadMapRule
    preloadedGrid: Redwings


# --- ported from wizden ---

- type: preloadedGrid
  id: ShuttleCargoLost
  path: /Maps/SS220/Shuttles/lostSoul/lost_cargo.yml # SS220 ReWork Soul Shuttle
  copies: 1 #SS220 ReWork Soul Shuttle

- type: preloadedGrid
  id: TravelingCuisine
  path: /Maps/SS220/Shuttles/lostSoul/traveling_china_cuisine.yml # SS220 ReWork Soul Shuttle
  copies: 1 #SS220 ReWork Soul Shuttle

- type: preloadedGrid
  id: DisasterEvacPod
  path: /Maps/SS220/Shuttles/lostSoul/disaster_evacpod.yml # SS220 ReWork Soul Shuttle
  copies: 2 #SS220 ReWork Soul Shuttle

- type: entity
  parent: BaseUnknownShuttleRule
  id: UnknownShuttleCargoLost
  components:
  - type: StationEvent
    maxOccurrences: 1 # should be the same as [copies] in shuttle_incoming_event.yml
    weight: 8 #SS220 ReWork Soul Shuttle
  - type: LoadMapRule
    preloadedGrid: ShuttleCargoLost

- type: entity
  parent: BaseUnknownShuttleRule
  id: UnknownShuttleTravelingCuisine
  components:
  - type: StationEvent
    startAnnouncement: station-event-unknown-shuttle-incoming
    maxOccurrences: 1 # should be the same as [copies] in shuttle_incoming_event.yml
    weight: 6 #SS220 ReWork Soul Shuttle
  - type: LoadMapRule
    preloadedGrid: TravelingCuisine

- type: entity
  parent: BaseUnknownShuttleRule
  id: UnknownShuttleDisasterEvacPod
  components:
  - type: StationEvent
    startAnnouncement: station-event-unknown-shuttle-incoming
    maxOccurrences: 2 # should be the same as [copies] in shuttle_incoming_event.yml
    weight: 4 #SS220 ReWork Soul Shuttle
  - type: LoadMapRule
    preloadedGrid: DisasterEvacPod
