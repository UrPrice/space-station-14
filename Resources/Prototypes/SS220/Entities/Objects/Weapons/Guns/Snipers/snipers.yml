- type: entity
  name: fusee
  parent: [ BaseItem, BaseGunWieldable ]
  id: WeaponFusee
  description: Guns at the ready! Aim! Fire!
  components:
  - type: EmitSoundOnLand
    sound:
      path: /Audio/SS220/Effects/Drop/lsmg.ogg
      params:
        volume: 2
  - type: Sprite
    sprite: SS220/Objects/Weapons/Guns/Snipers/fusee.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
  - type: AmmoCounter
  - type: Sharp #because bayonet
  - type: Item
    size: Ginormous
  - type: Gun
    minAngle: 50
    maxAngle: 70
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/sniper.ogg
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
        ents: []
  - type: UseDelayOnShoot
  - type: UseDelay
    delay: 8
  - type: BallisticAmmoProvider
    whitelist:
      tags:
      - CartridgeUnitary
    capacity: 1
    proto: CartridgeUnitary
  - type: MeleeWeapon
    wideAnimationRotation: -135
    damage:
      types:
        Piercing: 60 #doesnt work BRUH
    angle: 0
    animation: WeaponArcThrust
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: StaticPrice
    price: 50
  - type: GunRequiresWield
  - type: HeldSpeedModifier
    sprintModifier: 0.7
    mirrorClothingModifier: false
  - type: Blocking # not the best option, but blocking hardcoded to shields sadly
    passiveBlockModifier:
      coefficients:
        Blunt: 1.0
    activeBlockModifier:
      coefficients:
        Blunt: 1.0

- type: entity
  name: SAR-60
  parent: [BaseItem, BaseGunWieldable]
  id: WeaponSniperCompact
  description: "A compact, single-shot rifle that fires powerful antimateriel rounds. This one has a reflex sight and a recoil compensator on it. \n It has a marking on it's frame saying 'NT-SAD-SAR-60'"
  components:
  - type: Sprite
    sprite: SS220/Objects/Weapons/Guns/Snipers/heavy_sniper.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
  - type: Item
    size: Large
    shape:
    - 0,0,4,1
    sprite: SS220/Objects/Weapons/Guns/Snipers/heavy_sniper.rsi
  - type: ItemSlots
    slots:
      gun_chamber:
        name: Chamber
        startingItem: CartridgeAntiMateriel
        priority: 1
        whitelist:
          tags:
            - CartridgeAntiMateriel
  - type: ContainerContainer
    containers:
      gun_chamber: !type:ContainerSlot
  - type: ChamberMagazineAmmoProvider
    autoCycle: false
    boltClosed: false
    canRack: false
    soundBoltClosed: /Audio/Weapons/Guns/Cock/lmg_cock.ogg
    soundBoltOpened: /Audio/Weapons/Guns/Cock/lmg_cock.ogg
    soundRack: /Audio/Weapons/Guns/Cock/lmg_cock.ogg
  - type: Clothing
    sprite: SS220/Objects/Weapons/Guns/Snipers/heavy_sniper.rsi
    quickEquip: false
    slots:
    - suitStorage
  - type: GunRequiresWield
  - type: Appearance
  - type: Gun
    fireRate: 5 # it could as well be 1000, this is a single-shot anyway
    selectedMode: SemiAuto
    availableModes:
      - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/sniper.ogg

