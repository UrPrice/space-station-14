- type: entity
  parent: BasicHitscan
  name: red shuttle light laser
  categories: [ HideSpawnMenu ]
  id: RedShuttleLightLaser
  components:
  - type: HitscanBasicDamage
    damage:
      types:
        Heat: 13
  - type: ShowNavInfo
    navInfo: !type:ShuttleNavHitscanInfo
      enabled: true
      width: 0.6

- type: entity
  parent: BasicHitscan
  name: pulse laser enhanced
  id: PulseEnhanced
  categories: [ HideSpawnMenu ]
  components:
  - type: HitscanBasicDamage
    damage:
      types:
        Heat: 38
  - type: HitscanBasicVisuals
    muzzleFlash:
      sprite: SS220/Objects/Weapons/Guns/Projectiles/projectiles_cev.rsi
      state: muzzle_u_laser
    travelFlash:
      sprite: SS220/Objects/Weapons/Guns/Projectiles/projectiles_cev.rsi
      state: u_laser
    impactFlash:
      sprite: SS220/Objects/Weapons/Guns/Projectiles/projectiles_cev.rsi
      state: impact_u_laser

- type: entity
