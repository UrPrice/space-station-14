# Death Squad
- type: entity
  name: pulse rifle
  parent: BaseWeaponBattery
  id: WeaponPulseRifle2
  description: A heavy-duty energy rifle capable of annihilating any structures.
  suffix: Винтовка, Death Squad
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Battery/pulse_rifle.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-unshaded-4
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: Clothing
    sprite: Objects/Weapons/Guns/Battery/pulse_rifle.rsi
  - type: Gun
    fireRate: 2.5
  - type: Battery
    maxCharge: 400
    startingCharge: 400
  - type: HitscanBatteryAmmoProvider
    proto: Pulsekill
    fireCost: 1
  - type: BatteryWeaponFireModes
    fireModes:
    - proto: Pulsekill
      name: firemode-name-kill
      fireCost: 1
      gunModifiers:
        soundGunshot:  /Audio/SS220/Weapons/Guns/Gunshots/rifle.ogg
    - proto: PulseDESTROY
      name: firemode-name-destroy
      fireCost: 5
      gunModifiers:
        soundGunshot:  /Audio/SS220/Weapons/Guns/Gunshots/rifle.ogg

- type: entity
