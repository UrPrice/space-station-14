    zeroVisible: false
  - type: GunWieldBonus
    minAngle: -2
    maxAngle: -13
  - type: ProjectileBatteryAmmoProvider
    proto: BulletLaserSMG
    fireCost: 48
  - type: Appearance
  - type: Item
    size: Large
    shape:
    - 0,0,3,1
  - type: ItemSlots
    slots:
      cell_slot:
        name: Magazine
        startingItem: LaserSMGPowerCell
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        whitelist:
          tags:
            - LaserSMGPowerCell

