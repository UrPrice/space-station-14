- type: entity
  parent: BaseWeaponBatterySmall
  id: WeaponSynergisticEnergyGun
  name: synergistic gun
  description: "An innovative weapon that combines advanced technology and a unique design. It has two shooting modes: normal and enhanced."
  components:
  - type: Sprite
    sprite: SS220/Objects/Weapons/Guns/Battery/synergistic_energy_gun.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: laser-mag-3
      map: ["enum.GunVisualLayers.Mag"]
    - state: laser-mag-unshaded-3
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: Clothing
    sprite: SS220/Objects/Weapons/Guns/Battery/synergistic_energy_gun.rsi
  - type: Gun
  - type: HitscanBatteryAmmoProvider
    proto: RedLightLaser
    fireCost: 24.5
  - type: BatteryWeaponFireModes
    fireModes:
    - proto: RedLightLaser
      name: firemode-name-laser
      fireCost: 24.5
      gunModifiers:
        soundGunshot: /Audio/Weapons/Guns/Gunshots/laser_cannon.ogg
        fireRate: 4
      magState: laser-mag
    - proto: PulseEnhanced
      name: firemode-name-enhanced
      fireCost: 62.5
      gunModifiers:
        soundGunshot: /Audio/Weapons/Guns/Gunshots/laser_cannon.ogg
        fireRate: 1.5
      magState: enhanced-mag
  - type: MagazineVisuals
    magState: laser-mag
    steps: 4
    zeroVisible: true
  - type: Appearance
  - type: StaticPrice
    price: 750

- type: entity
  parent: BaseWeaponBatterySmall
  id: WeaponEnergyGunRevolver
  name: energy revolver
  description: A standard energy revolver manufactured by NT. It is rarely used due to its severely limited ammunition supply and is usually delivered to some remote areas.
  components:
  - type: Sprite
    sprite: SS220/Objects/Weapons/Guns/Battery/laser_revolver.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: laser-mag-unshaded-5
      map: ["enum.GunVisualLayers.MagUnshaded"]
      shader: unshaded
  - type: Clothing
    sprite: SS220/Objects/Weapons/Guns/Battery/laser_revolver.rsi
  - type: Gun
    fireRate: 1.2
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser_cannon.ogg
  - type: HitscanBatteryAmmoProvider
    proto: LaserEnhanced
    fireCost: 150
  - type: BatteryWeaponFireModes
    fireModes:
    - proto: LaserEnhanced
      name: firemode-name-laser
      fireCost: 150
      magState: laser-mag
    - proto: BulletDisabler
      fireCost: 62.5
      magState: disabler-mag
      gunModifiers:
        fireRate: 2
  - type: MagazineVisuals
    magState: laser-mag
    steps: 6
    zeroVisible: true
  - type: Appearance
  - type: StaticPrice
    price: 750

- type: entity
  parent: WeaponEnergyGunRevolver
  id: WeaponEnergyGunRevolverSelfRecharger
  suffix: SelfRecharger
  components:
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 48
    autoRechargePause: true
    autoRechargePauseTime: 10

# Base KR
- type: entity
  parent: BaseWeaponPowerCell
  id: BaseWeaponBlaster
  abstract: true
  components:
  - type: Sprite
    sprite: SS220/Shitspawn/FractWarEbent/Objects/Weapons/Guns/Battery/ert_blaster.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-5
        map: ["enum.GunVisualLayers.Mag"]
      - state: mag-unshaded-5
        map: ["enum.GunVisualLayers.MagUnshaded"]
        shader: unshaded
  - type: Clothing
    sprite: SS220/Shitspawn/FractWarEbent/Objects/Weapons/Guns/Battery/ert_blaster.rsi
    quickEquip: false
    slots:
      - Back
      - suitStorage
  - type: Item
    size: Large
  - type: MagazineVisuals
    magState: mag
    steps: 6
    zeroVisible: true
  - type: Wieldable
  - type: GunWieldBonus
    minAngle: -15
    maxAngle: -22
  - type: Gun
    fireRate: 6
    minAngle: 17
    maxAngle: 29
    angleIncrease: 3
    angleDecay: 16
    soundGunshot:
      path: /Audio/SS220/Weapons/Guns/Gunshots/blaster_nt.ogg

- type: entity
  parent: BaseWeaponBlaster
  id: WeaponBlasterKRS
  name: blaster KRS
  description: An old reliable blaster rifle. There is only a semi-automatic type of shooting.
  components:
  - type: Gun
    selectedMode: Burst
    availableModes:
      - Burst
  - type: ProjectileBatteryAmmoProvider
    proto: BulletBlasterBolt
    fireCost: 62.5
  - type: BatteryWeaponFireModes
    fireModes:
      - proto: BulletBlasterBolt
        name: firemode-name-blaster
        fireCost: 62.5
      - proto: BulletBlasterBoltPiercingWindow
        name: firemode-name-blaster-piercing-window
        fireCost: 62.5
      - proto: BulletDisablerSmg
        name: firemode-name-disabler
        fireCost: 40
  - type: ItemSlots
    slots:
      cell_slot:
        name: Magazine
        startingItem: PowerCellBlaster
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        whitelist:
          tags:
            - PowerCellBlaster

- type: entity
  parent: BaseWeaponBlaster
  id: WeaponBlasterKRV
  name: blaster KRV
  description: An advanced blaster rifle. Used by special operatives.
  components:
  - type: Gun
    selectedMode: FullAuto
    availableModes:
      - SemiAuto
      - Burst
      - FullAuto
  - type: ProjectileBatteryAmmoProvider
    proto: BulletBlasterPulse
    fireCost: 87.5
  - type: BatteryWeaponFireModes
    fireModes:
      - proto: BulletBlasterPulse
        name: firemode-name-blaster
        fireCost: 87.5
      - proto: BulletDisablerSmg
        name: firemode-name-disabler
        fireCost: 40
  - type: ItemSlots
    slots:
      cell_slot:
        name: Magazine
        startingItem: PowerCellBlasterHighCapacity
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        whitelist:
          tags:
            - PowerCellBlaster

- type: entity
  name: ik 40 laser carbine
  parent: BaseWeaponBlaster
  id: WeaponLaserSMG
  description: A powerful laser carbine resembling a rifle, which relies more on battery cartridges than on an integrated power cell. It is used by NanoTrasen Corporate Security squads in combat operations.
  components:
  - type: Sprite
    sprite: SS220/Objects/Weapons/Guns/Battery/laser_carabine.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
      - state: mag-unshaded-4
        map: ["enum.GunVisualLayers.MagUnshaded"]
        shader: unshaded
  - type: Clothing
    sprite: SS220/Objects/Weapons/Guns/Battery/laser_carabine.rsi
    quickEquip: false
    slots:
      - Back
      - suitStorage
  - type: Gun
    fireRate: 5.0
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser_cannon.ogg
  - type: MagazineVisuals
    magState: mag
