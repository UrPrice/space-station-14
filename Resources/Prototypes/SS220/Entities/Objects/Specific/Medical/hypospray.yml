- type: entity
  name: autoinjector
  parent: BaseItem
  id: BaseAutoinjectorSS220
  abstract: true
  components:
  - type: Sprite
    sprite: SS220/Objects/Misc/autoinjectors.rsi
    state: autoinjector
  - type: Item
    sprite: SS220/Objects/Misc/autoinjectors.rsi
    size: Small
  - type: SolutionContainerManager
    solutions:
      pen:
        maxVol: 15
  - type: ExaminableSolution
    solution: pen
  - type: Injector
    solutionName: pen
    currentTransferAmount: null
    activeModeProtoId: HyposprayInjectMode
    allowedModes:
    - HyposprayInjectMode
  - type: RefillableSolution
    solution: pen
  - type: Autoinjector

- type: entity
  name: medical autoinjector
  parent: BaseAutoinjectorSS220
  description: A single-use medical autoinjector designed for rapid drug delivery. Warning! The injector cannot be refilled after its initial use. Use wisely.
  id: MedAutoinjector
  components:
  - type: SolutionContainerManager
    solutions:
      pen:
        maxVol: 10
  - type: ExaminableSolution
    solution: pen
  - type: Injector
    solutionName: pen
    currentTransferAmount: null
    activeModeProtoId: HyposprayInjectMode
    allowedModes:
    - HyposprayInjectMode
  - type: Autoinjector
