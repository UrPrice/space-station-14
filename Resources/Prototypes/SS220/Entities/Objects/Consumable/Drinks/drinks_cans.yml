- type: entity
  id: DrinkCanPackBeer
  parent: BaseStorageItem
  name: beverage carrier
  suffix: Beer
  description: Used for conveniently storing several beer cans at once.
  components:
  - type: Sprite
    sprite: SS220/Objects/Misc/6pack.rsi
    layers:
      - state: plastic-thingy
      - state: 6pack1
        map: ["6pack1"]
        visible: false
      - state: 6pack2
        map: ["6pack2"]
        visible: false
      - state: 6pack3
        map: ["6pack3"]
        visible: false
      - state: 6pack4
        map: ["6pack4"]
        visible: false
      - state: 6pack5
        map: ["6pack5"]
        visible: false
      - state: 6pack6
        map: ["6pack6"]
        visible: false
  - type: Item
    size: Normal
  - type: Storage
    grid:
    - 0,0,2,3
    whitelist:
      tags:
      - Beer
    hideStackVisualsWhenClosed: false
  - type: StorageFill
    contents:
      - id: DrinkBeerCan
        amount: 6
  - type: ItemCounter
    count:
      tags: [Beer]
    composite: true
    layerStates:
    - 6pack1
    - 6pack2
    - 6pack3
    - 6pack4
    - 6pack5
  - type: Appearance

- type: entity
  parent: DrinkCanBaseFull
  id: DrinkRrrantaCan
  name: Rrr-anta
  description: The most synthetic drink in the most synthetic container. Drink at your own risk.
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 30
        reagents:
        - ReagentId: Rrranta
          Quantity: 30
  - type: Sprite
    sprite: SS220/Objects/Consumable/Drinks/rrranta.rsi
  - type: Item
    sprite: SS220/Objects/Consumable/Drinks/rrranta.rsi
  - type: EmptyCanCrush
    crushedCan: CrushedCanRrranta

- type: entity
  parent: DrinkCanBaseFull
  id: DrinkRelaxingPeachCan
  name: relaxing peach soda
  description: Rumor has it that daily consumption of this drink will make you kinder and more empathetic to those around you. But those are just rumors! Sold under the explosive brand name "RPG"!
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 30
        reagents:
        - ReagentId: KiraSpecial
          Quantity: 8
        - ReagentId: RootBeerFloat
          Quantity: 8
        - ReagentId: Antifreeze
          Quantity: 8
        - ReagentId: DoctorsDelight
          Quantity: 6
  - type: Sprite
    sprite: Objects/Consumable/Drinks/starkist.rsi
  - type: Item
    sprite: Objects/Consumable/Drinks/starkist.rsi
  - type: EmptyCanCrush
    crushedCan: CrushedCanRelaxingPeach
