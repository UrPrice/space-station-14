#Spider queen webs

#Base
- type: entity
  id: BaseSpiderWeb
  name: web
  description: Sticky web.. I wonder where it comes from?
  abstract: true
  categories: [ HideSpawnMenu ]
  placement:
    mode: SnapgridCenter
    snap:
      - Wall
  components:
  - type: PlacementReplacement
    key: web
  - type: MeleeSound
    soundGroups:
      Brute:
        path:
          "/Audio/Weapons/slash.ogg"
  - type: Sprite
    sprite: Structures/floor_web.rsi
    drawdepth: WallMountedItems
  - type: Appearance
  - type: Clickable
  - type: Transform
    anchored: true
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        hard: false
        density: 1000
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        mask:
        - ItemMask
  - type: Damageable
    damageModifierSet: Wood
  - type: Destructible
  - type: Temperature
    heatDamage:
      types:
        Heat: 5
    coldDamage: {}
    coldDamageThreshold: 0
  - type: Flammable
    fireSpread: true
    damage:
      types:
        Heat: 5
  - type: Reactive
    groups:
      Flammable: [Touch]
      Extinguish: [Touch]
  - type: SpiderWebObject
  - type: IconSmooth
    key: web
    additionalKeys:
    - walls
    base: web_
  - type: SpeedModifierContacts
    ignoreWhitelist:
      components:
          - IgnoreSpiderWeb

#Web
- type: entity
  parent: BaseSpiderWeb
  id: SpiderWebFragile
  name: web
  placement:
    mode: SnapgridCenter
    snap:
      - Wall
  components:
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 20
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: SpeedModifierContacts
    walkSpeedModifier: 0.25
    sprintSpeedModifier: 0.25
  - type: DamageContacts
    standStillTime: 3
    ignoreResistances: true
    damage:
      types:
        Piercing: -1.5
        Blunt: -0.75
        Slash: -0.75
        Heat: -1
      groups:
        Burn: -2
        Toxin: -5
        Airloss: -2.5
    ignoreBlacklist:
      tags:
      - SpiderQueen
      - SpiderServant
      - SpiderLittle

- type: entity
  parent: BaseSpiderWeb
  id: SpiderWebDurable
  name: durable web
  placement:
    mode: SnapgridCenter
    snap:
      - Wall
  components:
  - type: Sprite
    color: "#cccccc"
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 40
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: SpeedModifierContacts
    walkSpeedModifier: 0.15
    sprintSpeedModifier: 0.15
  - type: DamageContacts
    standStillTime: 3
    ignoreResistances: true
    damage:
      types:
        Piercing: -3
        Blunt: -1.5
        Slash: -1.5
        Heat: -3
      groups:
        Burn: -4
        Toxin: -8
        Airloss: -4
    ignoreBlacklist:
      tags:
      - SpiderQueen
      - SpiderServant
      - SpiderLittle
    bloodlossModifier: -12

- type: entity
  parent: BaseSpiderWeb
  id: SpiderWebDespawned
  name: web
  categories: [ HideSpawnMenu ]
  placement:
    mode: SnapgridCenter
    snap:
      - Wall
  components:
  - type: TimedDespawn
    lifetime: 13
  - type: SpeedModifierContacts
    walkSpeedModifier: 0.1
    sprintSpeedModifier: 0.1
