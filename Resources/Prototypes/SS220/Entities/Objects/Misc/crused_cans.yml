- type: entity
  abstract: true
  parent: BaseItem
  id: CrushedCanBase
  name: crushed can
  description: A sweet, carbonated soft drink.
  components:
  - type: Sprite
    sprite: SS220/Objects/Consumable/TrashDrinks/CrushedCans/cola.rsi
    state: icon
  - type: Item
    size: Tiny
  - type: SolutionContainerManager
    solutions:
      grindable: &grindable
        reagents:
        - ReagentId: Aluminium
          Quantity: 4
        - ReagentId: Iron
          Quantity: 1
  - type: Extractable
    grindableSolutionName: grindable
  - type: SpaceGarbage
  - type: Tag
    tags:
    - Trash

