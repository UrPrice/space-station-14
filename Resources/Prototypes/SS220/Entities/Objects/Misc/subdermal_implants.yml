- type: entity
  parent: BaseSubdermalImplant
  id: EmptyChemicalImplant
  name: empty chemical implant
  description: empty-chemical-implant-desc
  components:
  - type: SubdermalImplant
    permanent: true
    implantAction: ActionUseChemicalImplant
  - type: AddReagentsOnTrigger
    targetUser: true
  - type: TriggerOnActivateImplant
  - type: Sprite
    sprite: SS220/Objects/ChemicalImplants/implants.rsi
    state: implant
  - type: Item
    sprite: SS220/Objects/ChemicalImplants/implants.rsi
    size: Small
  - type: SolutionContainerManager
    solutions:
      beaker:
        maxVol: 80
        canReact: false
  - type: RefillableSolution
    solution: beaker
  - type: ExaminableSolution
    solution: beaker
  - type: InteractionOutline
  - type: Clickable
  - type: Appearance
  - type: SolutionContainerVisuals
    maxFillLevels: 1
    changeColor: false
    emptySpriteName: implant_used
  - type: Tag
    tags:
    - ChemicalImplant

- type: entity
  parent: EmptyChemicalImplant
  id: CombatChemicalImplant
  name: combat chemical implant
  description: combat-chemical-implant-desc
  components:
  - type: Sprite
    sprite: SS220/Objects/ChemicalImplants/implants.rsi
    layers:
    - state: combat
