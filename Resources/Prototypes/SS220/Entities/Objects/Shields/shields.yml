- type: entity
  parent: EnergyShield
  id: EnergyShieldSyndi
  components:
  - type: Sprite
    sprite: SS220/Objects/Weapons/Melee/e_shield_syndi.rsi
  - type: Item
    sprite: SS220/Objects/Weapons/Melee/e_shield_syndi.rsi
  - type: PointLight
    color: red
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 180
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
        !type:DamageTrigger
        damage: 100
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
      - !type:PlaySoundBehavior
        sound:
          collection: GlassBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          BrokenEnergyShieldSyndi:
            min: 1
            max: 1

- type: entity
  parent: BrokenEnergyShield
  id: BrokenEnergyShieldSyndi
  components:
  - type: Sprite
    sprite: SS220/Objects/Weapons/Melee/e_shield_syndi.rsi
  - type: Item
    sprite: SS220/Objects/Weapons/Melee/e_shield_syndi.rsi