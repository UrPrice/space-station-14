- type: entity
  name: Roxie
  parent: MobSecDog
  id: MobSecDogRoxi
  description: You shouldn't joke with her - her list of awards includes a medal for bravery.
  components:
  - type: Language
    availableLanguages:
    - id: Doggish
      canSpeak: True
    - id: Galactic
      canSpeak: false
    - id: Mousey
      canSpeak: false
    - id: Feline
      canSpeak: false
    - id: Monkey
      canSpeak: false
    - id: Reptilian
      canSpeak: false
    - id: Piggish
      canSpeak: false
  - type: GhostRole
    makeSentient: true
    allowSpeech: true
    allowMovement: true
    name: ghost-role-information-security-pet-Roxi-name
    description: ghost-role-information-security-pet-Roxi-description
    job: SecurityPet
  - type: GhostTakeoverAvailable
  - type: InteractionPopup
    successChance: 1
  - type: Butcherable
    spawned:
    - id: FoodMeat
      amount: 2
  - type: Grammar
    attributes:
      proper: true
      gender: female
  - type: Loadout
    prototypes: [ MobSecDogRoxiGear ]
  - type: Tag
    tags:
    - CannotSuicide
    - VimPilot
    - DoorBumpOpener

