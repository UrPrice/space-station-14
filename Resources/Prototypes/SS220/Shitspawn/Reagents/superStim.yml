- type: reagent
  id: UnknownSuperStim
  name: reagent-name-superstim
  group: Medicine
  desc: reagent-desc-leporazine
  physicalDesc: reagent-desc-superstim
  flavor: medicine
  color: "#ff7db5"
  # Just in case you REALLY want to water your plants
  plantMetabolism:
  - !type:PlantAdjustWater
    amount: 0.5
  metabolisms:
    Digestion:
      effects:
      - !type:SatiateThirst
        factor: 1.5
    # Dragon doesn't require airloss healing, so omnizine is still best for humans.
    Bloodstream:
      effects:
      - !type:HealthChange
        damage:
          types:
            Blunt: -6.67
            Slash: -6.67
            Piercing: -6.66
            Heat: -5
            Shock: -5
            Cold: -5
            Caustic: -5
            Poison: -10
            Radiation: -10
            Asphyxiation: -10
            Bloodloss: -10
      - !type:GenericStatusEffect
        key: Stutter
        component: ScrambledAccent
      - !type:MovementSpeedModifier
        walkSpeedModifier: 1.35
        sprintSpeedModifier: 1.35
      - !type:Jitter
      - !type:GenericStatusEffect
        key: Stun
        time: 3
        type: Remove
      - !type:GenericStatusEffect
        key: KnockedDown
        time: 3
        type: Remove
