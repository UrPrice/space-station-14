- type: entity
  parent: Clothing
  id: PortableRecharger
  name: portable recharger
  description: High-tech recharger adapted for portability.
  components:
  - type: Item
    size: Huge
    # SS220 PortableRecharger begin
    shape:
    - 0,0,4,1
    # SS220 PortableRecharger end
  - type: Sprite
    sprite: Objects/Power/portable_recharger.rsi
    state: charging
  - type: Clothing
    equippedPrefix: charging
    quickEquip: false
    slots:
    - back
  - type: Charger
    slotId: charger_slot
    portable: true
  - type: PowerChargerVisuals
  - type: ApcPowerReceiver
    needsPower: false
    powerLoad: 0
  - type: StaticPrice
    price: 500
  - type: Tag
    tags: [] # ignore "WhitelistChameleon" tag
  - type: ContainerContainer
    containers:
      charger_slot: !type:ContainerSlot
  - type: ItemSlots
    slots:
      charger_slot:
        ejectOnInteract: false # SS220 Alternative interaction for eject
        whitelist:
          components:
          - HitscanBatteryAmmoProvider
          - ProjectileBatteryAmmoProvider
          - Stunbaton # SS220 Added
          - PowerCell # SS220 Added
          # SS220 Added tags for charging support begin
          tags:
          - WeaponRechargerWhitelist
          - DefibrillatorCompact
          # SS220 Added tags for charging support end
        # SS220 Added blacklist begin
        blacklist:
          tags:
          - PotatoBattery
          - E-N
        # SS220 Added blacklist end
