- type: entityTable
  id: RandomCrystalTable
  table: !type:GroupSelector
    children:
    - id: CrystalGreen
    - id: CrystalPink
    - id: CrystalOrange
    - id: CrystalBlue
    - id: CrystalCyan
    - id: CrystalYellow
    - id: CrystalBlack
    - id: CrystalGrey
    - id: CrystalPurple #SS220-New-Crystals-start
    - id: CrystalWhite #SS220-New-Crystals-end

- type: entity
  name: Crystal Spawner
  suffix: 70%
  id: CrystalSpawner
  parent: MarkerBase
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: Structures/Decoration/crystal.rsi
      state: crystal1 #SS220-Crystal-Resprite
  - type: EntityTableSpawner
    table: !type:NestedSelector
      tableId: RandomCrystalTable
      prob: 0.7
