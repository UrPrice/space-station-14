      - stampedColor: '#777777FF'
        stampedName: Орден Тишины
      content: >2-

        [head=3]Мир — Театр, а наша жизнь — Пьеса, в которой Хранительница распределила роли.[/head]


        [head=3][italic]Нам остается лишь их с достоинством сыграть![/italic][/head]


        Возьмите на себя одну из четырёх ролей и отправляйтесь в драматичный тур по космосу, оставляя после себя эмоции. Какие? Не важно. Главное — вклад нашего Ордена навсегда должен закрепится в людских сердцах.







        [color=#C0C0C0][italic]Есть события на станции. Они реальны. А есть постановка по мотивам, тоже реальная. И есть актёры, которые играют персонажа и переигрывают события из его жизни.[/italic] [/color]
