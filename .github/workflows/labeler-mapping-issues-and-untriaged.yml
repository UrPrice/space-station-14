name: "Mapping issues"

on:
  issues:
    types: [opened]

jobs:
  add-labels-and-link:
    runs-on: ubuntu-latest
    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.REVIEWER_APP }}
          private-key: ${{ secrets.REVIEWER_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Check & link
        uses: actions/github-script@v6
        with:
          github-token: ${{ steps.generate_token.outputs.token }}
          script: |
            const issueLabels = context.payload.issue.labels.map(l => l.name);
            const issueBody = context.payload.issue.body || '';

            if (!issueLabels.includes('Mapping Issues')) {
              console.log('Not mapping issue. Skip action.');
              return;
            }

            const options = {
              'Frankenstein': { parentIssue: 123 },
              'Axioma': { parentIssue: 123 },
              'Donuts': { parentIssue: 123 },
              'Eclipse': { parentIssue: 123 },
              'Astro': { parentIssue: 123 },
              'Nightshift': { parentIssue: 123 },
              'Tox': { parentIssue: 123 },
              'Другое': { parentIssue: 123 }
            };

            let selectedOption = null;
            for (const option in options){
              if (issueBody.includes(option)) {
                selectedOption = options[option];
                break;
              }
            }

            if (selectedOption && selectedOption.parentIssue) {
              const sourceOwner = context.repo.owner;
              const sourceRepo = context.repo.repo;
              const targetOwner = 'SerbiaStrong-220';
              const targetRepo = 'DevTeam220';

              try {
                const parent = await github.rest.issues.get({
                  owner: targetOwner,
                  repo: targetRepo,
                  issue_number: selectedOption.parentIssue
                });

                const crossRepoLink = `- [ ] ${sourceOwner}/${sourceRepo}#${context.issue.number}`;
                const parentBody = parent.data.body || '';
                const newParentBody = parentBody + '\n' + crossRepoLink;

                await github.rest.issues.update({
                  owner: targetOwner,
                  repo: targetRepo,
                  issue_number: selectedOption.parentIssue,
                  body: newParentBody
                });
                console.log(`Linked #${context.issue.number} to ${targetOwner}/${targetRepo}#${selectedOption.parentIssue}`);
              } catch (error) {
                console.error(`Failed to link #${selectedOption.parentIssue}`, error);
              }
            } else {
              console.log('No options');
            }
